# LeWM-VC Training Configuration
#
# Usage:
#   python -m src.scripts.train --config configs/train_config.yaml
#
# Phase schedule (from training-data-plan.md):
#   Phase 0: Intra-frame + Entropy warm-up     (12h / replace random-noise checkpoint)
#   Phase 1: Core temporal model + JEPA        (25h / 3 lambdas in parallel)
#   Phase 2: Dual-layer SVC splitter/fuser     (35h / forensic two-stream)
#   Phase 3: Multi-lambda fine-tuning          (18h / 5 rate points)
#   Phase 4: QAT + TensorRT export             (10h / edge deployment)

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  roots:
    - "datasets/virat/frames"

  image_size: 256
  sequence_length: 16
  frame_stride: 1
  augment: true

  split:
    train: 0.70
    val: 0.15
    test: 0.15
    seed: 42

# ---------------------------------------------------------------------------
# Model architecture
# ---------------------------------------------------------------------------
model:
  latent_dim: 192
  patch_size: 16
  encoder:
    hidden_dim: 192
    num_layers: 6
    num_heads: 3
    mlp_ratio: 4.0
    semantic_surprise: true
  predictor:
    hidden_dim: 256
    num_layers: 8
    num_heads: 4
    context_len: 4
  decoder:
    hidden_dim: 512
  entropy:
    hyper_channels: 256
    num_components: 2
  quantizer:
    num_levels: 256

# ---------------------------------------------------------------------------
# Training hyperparameters
# ---------------------------------------------------------------------------
training:
  batch_size: 8
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true

  precision: fp32

  max_grad_norm: 1.0
  weight_decay: 0.01

  lr_encoder: 1.0e-4
  lr_predictor: 2.0e-5
  lr_decoder: 2.0e-5
  lr_entropy: 1.0e-4
  lr_rate_control: 1.0e-4

  lr_scheduler: cosine
  lr_warmup_steps: 1000

# ---------------------------------------------------------------------------
# Phase schedule (steps per phase, loss weights)
# ---------------------------------------------------------------------------
phases:
  # Phase 0: JEPA warmup — train encoder + predictor + decoder
  #   Loss: L = R + lambda*D + 2.0*L_JEPA + 0.001*SIGReg
  #   Decoder warms up alongside encoder/predictor to prevent NaN at Phase 1 transition
  #   Entropy stays frozen — its rate gradient spikes if unlocked too early
  #   Freezes: entropy_model, rate_controller, quantizer
  phase0:
    steps: 50000
    gamma: 2.0
    delta: 0.001
    lambda: 1.0
    freeze: ["entropy_model", "rate_controller", "quantizer"]
    mse_weight: 1.0
    lpips_weight: 0.0

  # Phase 1: Joint RD — full pipeline, single lambda
  #   Loss: L = R + lambda*D + 1.0*L_JEPA + 0.0005*SIGReg
  #   entropy_warmup_steps: first N steps freeze predictor+decoder+encoder
  #   (entropy model trains on stationary residuals before full fine-tuning)
  #   Encoder always frozen (rate gradient through STE destabilizes it)
  phase1:
    steps: 25000
    entropy_warmup_steps: 25000
    gamma: 1.0
    delta: 0.0005
    freeze: ["encoder"]
    mse_weight: 0.7
    lpips_weight: 0.3

  # Phase 2: Quantization-Aware Training
  #   Hard rounding kicks in → rate gradient blocked at quantizer
  #   Predictor frozen to prevent residual distribution shift (would spike entropy model)
  #   Decoder + entropy model fine-tune with hard quantization
  #   15k steps is enough — decoder converges fast, entropy already converged
  phase2:
    steps: 15000
    gamma: 1.0
    delta: 0.0005
    freeze: ["encoder", "predictor"]
    mse_weight: 0.7
    lpips_weight: 0.3

  # Phase 3: Decoder refinement — adapt decoder to QAT-hardened latents
  #   Only decoder trains (high LPIPS weight for perceptual quality)
  #   Encoder + predictor frozen to keep residuals stable
  #   Entropy model frozen to keep rate estimate stable
  phase3:
    steps: 15000
    gamma: 0.5
    delta: 0.0001
    freeze: ["encoder", "predictor", "entropy_model"]
    mse_weight: 0.5
    lpips_weight: 0.5

  # Phase 4: Cooldown — final low-LR polish
  #   Predictor stays frozen to prevent residual shift
  #   Decoder + entropy model get final refinement at near-zero LR
  phase4:
    steps: 20000
    gamma: 0.5
    delta: 0.0001
    freeze: ["encoder", "predictor"]
    mse_weight: 0.5
    lpips_weight: 0.5

# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Experiment tracking
# ---------------------------------------------------------------------------
wandb:
  project: sentinel
  entity: null
  enabled: true
  log_interval: 50

# RD Lambda schedule (multi-lambda training)
# ---------------------------------------------------------------------------
lambda_schedule:
  values: [0.02, 0.05, 0.08, 0.12, 0.20]
  primary: 0.05

# ---------------------------------------------------------------------------
# Logging and checkpoints
# ---------------------------------------------------------------------------
logging:
  tensorboard: true
  log_dir: "runs"
  log_interval: 10
  val_interval: 200
  save_interval: 2500
  image_log_interval: 1000

checkpoint:
  dir: "checkpoints"
  keep_last: 5
  save_optimizer: true

# ---------------------------------------------------------------------------
# SVC training (Phase 2 equivalent, for train_svc.py)
# ---------------------------------------------------------------------------
svc:
  base_dim: 64
  enh_dim: 128
  bl_quant_bits: 4
  el_quant_bits: 8
  bl_loss_weight: 1.0
  full_loss_weight: 1.0
  task_loss_weight: 0.5
