version: '3.8'

services:
  lewmvc:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./checkpoint:/app/checkpoint:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s